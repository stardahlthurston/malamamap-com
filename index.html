<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mālama Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ocean: #1a6b6b;
      --ocean-light: #2a9d8f;
      --sand: #f5efe6;
      --bark: #3d2b1f;
      --leaf: #4a7c59;
      --gold: #e9c46a;
      --white: #fdfaf6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--sand);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background organic shapes */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(42,157,143,0.15) 0%, transparent 70%);
      border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
      animation: morph 8s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -15%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(74,124,89,0.12) 0%, transparent 70%);
      border-radius: 40% 60% 30% 70% / 60% 40% 60% 40%;
      animation: morph 10s ease-in-out infinite reverse;
    }

    @keyframes morph {
      0%, 100% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; }
      50% { border-radius: 40% 60% 30% 70% / 60% 40% 60% 40%; }
    }

    .card {
      position: relative;
      z-index: 10;
      background: var(--white);
      border-radius: 24px;
      padding: 56px 48px 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow:
        0 4px 6px rgba(61,43,31,0.04),
        0 20px 60px rgba(61,43,31,0.10),
        0 0 0 1px rgba(61,43,31,0.06);
      animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(26,107,107,0.3);
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--bark);
      line-height: 1.2;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: var(--ocean);
    }

    .subtitle {
      font-size: 0.95rem;
      color: #7a6a60;
      margin-bottom: 36px;
      font-weight: 300;
      line-height: 1.6;
    }

    .tagline {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ocean-light);
      font-weight: 500;
      margin-bottom: 20px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--gold);
      margin: 0 auto 28px;
      border-radius: 2px;
    }

    .notice {
      background: rgba(26,107,107,0.06);
      border: 1px solid rgba(26,107,107,0.15);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.88rem;
      color: var(--ocean);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .notice strong {
      display: block;
      font-weight: 500;
      margin-bottom: 2px;
      color: var(--bark);
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, var(--ocean), var(--ocean-light));
      color: white;
      text-decoration: none;
      padding: 16px 40px;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 6px 20px rgba(26,107,107,0.35);
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(26,107,107,0.45);
    }

    .btn:active {
      transform: translateY(0);
    }

    .footer-note {
      margin-top: 24px;
      font-size: 0.78rem;
      color: #b0a89e;
    }

    .footer-note a {
      color: var(--ocean-light);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><img src="https://malamamap.org/logo.png" alt="Mālama Map logo" /></div>
    <h1>Mālama <span>Map</span></h1>
    <p class="tagline">Hawaiʻi Helping Hawaiʻi</p>
    <div class="divider"></div>
    <p class="subtitle">You've come to <strong>malamamap.com</strong> — click the button below to continue to Mālama Map.</p>
    <a class="btn" href="https://malamamap.org">Continue to Mālama Map →</a>
    <p class="footer-note">
      You'll be taken to <a href="https://malamamap.org">malamamap.org</a>
    </p>
  </div>
</body>
</html>
